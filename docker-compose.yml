services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: kaplen
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      retries: 5

  app:
    build: .
    command: gunicorn -w 4 -b 0.0.0.0:5000 --timeout 120 kaplen.app:app
    environment:
      - FLASK_ENV=production
      - DB_HOST=postgres
      - DB_NAME=kaplen
      - DB_USER=postgres
    env_file: .env
    ports:
      - "5000:5000"
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  pgdata:
