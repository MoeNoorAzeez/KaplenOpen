services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: kaplen
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      retries: 5

  app:
    build: .
    ports:
      - "5000:5000"
    env_file: .env
    environment:
      DB_HOST: db
      DB_NAME: kaplen
      DB_USER: postgres
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
